<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8" />
  <title>Ticket Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#ffffff" />

  <!-- اجازهٔ دوربین برای Safari -->
  <meta http-equiv="Permissions-Policy" content="camera=*" />

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app">
    <header class="app-header">
      <h1>مدیریت تیکت</h1>
    </header>

    <main class="app-main">

      <!-- جستجو -->
      <section class="search-box">
        <input id="searchInput" type="text" placeholder="جستجو..." />
      </section>

      <!-- مرتب‌سازی -->
      <section class="sort-box">
        <select id="sortSelect">
          <option value="newest">جدیدترین</option>
          <option value="oldest">قدیمی‌ترین</option>
          <option value="undone">انجام‌نشده‌ها</option>
        </select>
      </section>

      <!-- فرم تیکت -->
      <section class="ticket-form">
        <input id="ticketTitle" type="text" placeholder="عنوان تیکت" />
        <input id="ticketNote" type="text" placeholder="یادداشت" />

        <div class="form-actions">
          <button id="addTicketBtn" class="primary-btn">افزودن تیکت</button>
          <button id="scanQrBtn" class="secondary-btn">اسکن QR</button>
        </div>
      </section>

      <!-- بخش QR -->
      <section id="qrSection" class="qr-section" style="display:none;">
        <video id="qrVideo" class="qr-video" muted playsinline autoplay></video>
        <div class="qr-hint">دوربین را روی QR نگه دارید…</div>
        <div id="qrResult" class="qr-result"></div>
      </section>

      <!-- لیست تیکت‌ها -->
      <section class="ticket-list-section">
        <h2>تیکت‌ها</h2>
        <ul id="ticketList" class="ticket-list"></ul>
      </section>

    </main>
  </div>

  <!-- Service Worker -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>

  <!-- QR Scanner نهایی -->
  <script>
    async function startQRScanner() {
      const video = document.getElementById("qrVideo");
      const resultBox = document.getElementById("qrResult");
      const qrSection = document.getElementById("qrSection");

      qrSection.style.display = "block";
      resultBox.textContent = "";

      video.setAttribute("playsinline", "true");
      video.setAttribute("autoplay", "true");
      video.setAttribute("muted", "true");

      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" } },
          audio: false
        });
      } catch (e) {
        alert("دسترسی به دوربین ممکن نیست.");
        return;
      }

      video.srcObject = stream;
      await video.play();

      let detector = null;
      if ("BarcodeDetector" in window) {
        try {
          detector = new BarcodeDetector({ formats: ["qr_code"] });
        } catch (e) {
          detector = null;
        }
      }

      async function scanLoop() {
        if (!stream.active) return;

        try {
          if (detector) {
            const bitmap = await createImageBitmap(video);
            const codes = await detector.detect(bitmap);

            if (codes.length > 0) {
              const text = codes[0].rawValue;

              resultBox.textContent = "نتیجه: " + text;

              stream.getTracks().forEach(t => t.stop());

              if (text.startsWith("http://") || text.startsWith("https://")) {
                window.location.href = text;
                return;
              }

              document.getElementById("ticketTitle").value = text;
              return;
            }
          }
        } catch (err) {
          console.log("Scan error:", err);
        }

        requestAnimationFrame(scanLoop);
      }

      scanLoop();
    }

    document.getElementById("scanQrBtn").addEventListener("click", () => {
      startQRScanner();
    });
  </script>

  <!-- اسکریپت اصلی -->
  <script src="script.js"></script>

</body>
</html>
