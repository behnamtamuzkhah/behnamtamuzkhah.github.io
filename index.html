<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ticket Manager</title>

    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f7;
            color: #333;
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: #ffffff;
            border-bottom: 1px solid #ddd;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .title {
            font-size: 18px;
            font-weight: 600;
        }

        /* LANGUAGE SELECTOR */
        .lang-box {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #f0f0f0;
            padding: 4px 8px;
            border-radius: 8px;
        }

        .lang-box select {
            border: none;
            background: transparent;
            font-size: 14px;
            outline: none;
        }

        /* SEARCH BAR */
        .search-container {
            padding: 10px;
            background: #fff;
            border-bottom: 1px solid #ddd;
        }

        .search-container input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        /* BUTTONS */
        .actions {
            display: flex;
            gap: 10px;
            padding: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            background: #007aff;
            color: white;
        }

        .secondary {
            background: #e5e5ea;
            color: #333;
        }

        /* TICKET LIST */
        .ticket {
            background: white;
            margin: 10px;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #ddd;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .ticket-header {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .ticket-text {
            font-size: 16px;
            line-height: 1.4;
        }

        /* EDIT MODE */
        .edit-btn {
            background: #ff9500;
        }

        .delete-btn {
            background: #ff3b30;
        }
    </style>
</head>

<body>

<header>
    <div class="title" data-i18n="title">Tickets</div>

    <div class="lang-box">
        🌐
        <select id="langSelect">
            <option value="en">EN</option>
            <option value="de">DE</option>
            <option value="fa">FA</option>
            <option value="fr">FR</option>
            <option value="ja">JA</option>
            <option value="he">HE</option>
        </select>
    </div>
</header>

<div class="search-container">
    <input id="searchInput" type="text" data-i18n-placeholder="search" placeholder="Search...">
</div>

<div class="actions">
    <button id="scanBtn" data-i18n="scan">Scan QR</button>
    <button id="sortBtn" class="secondary" data-i18n="sort">Sort</button>
</div>

<div id="ticketList"></div>

<script>
/* ------------------ MULTILINGUAL TEXT ------------------ */
const translations = {
    en: { title: "Tickets", scan: "Scan QR", sort: "Sort", search: "Search..." },
    de: { title: "Tickets", scan: "QR scannen", sort: "Sortieren", search: "Suchen..." },
    fa: { title: "تیکت‌ها", scan: "اسکن QR", sort: "مرتب‌سازی", search: "جستجو..." },
    fr: { title: "Billets", scan: "Scanner QR", sort: "Trier", search: "Rechercher..." },
    ja: { title: "チケット", scan: "QRスキャン", sort: "並べ替え", search: "検索..." },
    he: { title: "כרטיסים", scan: "סרוק QR", sort: "מיין", search: "חיפוש..." }
};

function applyLanguage(lang) {
    document.querySelectorAll("[data-i18n]").forEach(el => {
        el.textContent = translations[lang][el.dataset.i18n];
    });
    document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
        el.placeholder = translations[lang][el.dataset.i18n-placeholder];
    });
    localStorage.setItem("lang", lang);
}

document.getElementById("langSelect").addEventListener("change", e => {
    applyLanguage(e.target.value);
});

/* Load saved language */
const savedLang = localStorage.getItem("lang") || "en";
document.getElementById("langSelect").value = savedLang;
applyLanguage(savedLang);

/* ------------------ TICKET STORAGE ------------------ */
let tickets = JSON.parse(localStorage.getItem("tickets") || "[]");

function saveTickets() {
    localStorage.setItem("tickets", JSON.stringify(tickets));
}

function renderTickets() {
    const list = document.getElementById("ticketList");
    list.innerHTML = "";

    const search = document.getElementById("searchInput").value.toLowerCase();

    tickets
        .filter(t => t.text.toLowerCase().includes(search))
        .forEach((t, index) => {
            const div = document.createElement("div");
            div.className = "ticket";

            div.innerHTML = `
                <div class="ticket-header">
                    <span>${new Date(t.date).toLocaleString()}</span>
                    <div>
                        <button class="edit-btn" onclick="editTicket(${index})">✏️</button>
                        <button class="delete-btn" onclick="deleteTicket(${index})">🗑️</button>
                    </div>
                </div>
                <div class="ticket-text">${t.text}</div>
            `;

            list.appendChild(div);
        });
}

renderTickets();

/* ------------------ EDIT & DELETE ------------------ */
function deleteTicket(i) {
    tickets.splice(i, 1);
    saveTickets();
    renderTickets();
}

function editTicket(i) {
    const newText = prompt("Edit ticket:", tickets[i].text);
    if (newText !== null) {
        tickets[i].text = newText.trim();
        saveTickets();
        renderTickets();
    }
}

/* ------------------ SORT ------------------ */
document.getElementById("sortBtn").addEventListener("click", () => {
    tickets.sort((a, b) => new Date(b.date) - new Date(a.date));
    saveTickets();
    renderTickets();
});

/* ------------------ QR SCAN ------------------ */
document.getElementById("scanBtn").addEventListener("click", async () => {
    try {
        const text = prompt("Simulated QR scan. Enter text:");
        if (text) {
            tickets.unshift({ text, date: Date.now() });
            saveTickets();
            renderTickets();
        }
    } catch (err) {
        alert("Camera not available.");
    }
});

/* ------------------ SEARCH ------------------ */
document.getElementById("searchInput").addEventListener("input", renderTickets);
</script>

</body>
</html>
