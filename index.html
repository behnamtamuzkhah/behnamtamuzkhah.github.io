<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ticket Manager</title>

<style>
    :root { color-scheme: dark; }

    body {
        margin: 0;
        background: #000;
        color: #f5f5f7;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 16px;
        background: #111;
        border-bottom: 1px solid #222;
        position: sticky;
        top: 0;
        z-index: 20;
    }

    .title { font-size: 20px; font-weight: 600; }

    .lang-box {
        display: flex;
        align-items: center;
        gap: 6px;
        background: #1c1c1e;
        padding: 4px 8px;
        border-radius: 8px;
    }

    .lang-box select {
        border: none;
        background: transparent;
        color: #fff;
        font-size: 14px;
        outline: none;
    }

    .search-container {
        padding: 10px;
        background: #000;
        border-bottom: 1px solid #222;
    }

    .search-container input {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #333;
        background: #1c1c1e;
        color: #fff;
        font-size: 16px;
    }

    .actions {
        display: flex;
        gap: 10px;
        padding: 10px;
    }

    button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        background: #0a84ff;
        color: white;
    }

    .secondary { background: #2c2c2e; }

    #ticketList { padding-bottom: 20px; }

    .ticket {
        background: #1c1c1e;
        margin: 10px;
        padding: 14px;
        border-radius: 12px;
        border: 1px solid #2c2c2e;
        word-break: break-word;
        white-space: pre-wrap;
    }

    .ticket-header {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        margin-bottom: 6px;
        color: #a1a1a6;
    }

    .edit-btn { background: #ff9f0a; }
    .delete-btn { background: #ff453a; }

    /* SCANNER */
    #scannerPage {
        position: fixed;
        inset: 0;
        background: #000;
        display: none;
        flex-direction: column;
        z-index: 999;
    }

    #camera {
        width: 100vw;
        height: 100vh;
        object-fit: cover;
    }

    .frame {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 260px;
        height: 260px;
        border-radius: 18px;
        box-shadow: 0 0 0 2px #00ff99;
        transform: translate(-50%, -50%);
    }

    .laser {
        position: absolute;
        left: 50%;
        width: 220px;
        height: 2px;
        background: #ff453a;
        transform: translateX(-50%);
        animation: scan 1.4s linear infinite;
    }

    @keyframes scan {
        0% { top: calc(50% - 120px); opacity: 0.2; }
        50% { opacity: 1; }
        100% { top: calc(50% + 120px); opacity: 0.2; }
    }

    .back-btn {
        position: absolute;
        top: 20px;
        left: 20px;
        background: #ffffff22;
        padding: 8px 14px;
        border-radius: 999px;
        border: none;
        color: #fff;
        font-size: 16px;
        z-index: 20;
    }
</style>
</head>

<body>

<header>
    <div class="title" data-i18n="title">Tickets</div>

    <div class="lang-box">
        🌐
        <select id="langSelect">
            <option value="en">EN</option>
            <option value="de">DE</option>
            <option value="fa">FA</option>
            <option value="fr">FR</option>
            <option value="ja">JA</option>
            <option value="he">HE</option>
        </select>
    </div>
</header>

<div class="search-container">
    <input id="searchInput" data-i18n-placeholder="search" placeholder="Search...">
</div>

<div class="actions">
    <button id="openScanner" data-i18n="scan">Scan QR</button>
    <button id="sortBtn" class="secondary" data-i18n="sort">Sort</button>
</div>

<div id="ticketList"></div>

<!-- SCANNER -->
<div id="scannerPage">
    <button class="back-btn" onclick="closeScanner()">← Back</button>
    <video id="camera" autoplay playsinline></video>
    <div class="frame"><div class="laser"></div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>

<script>
/* ------------------ LANG ------------------ */
const translations = {
    en: { title: "Tickets", scan: "Scan QR", sort: "Sort", search: "Search..." },
    de: { title: "Tickets", scan: "QR scannen", sort: "Sortieren", search: "Suchen..." },
    fa: { title: "تیکت‌ها", scan: "اسکن QR", sort: "مرتب‌سازی", search: "جستجو..." },
    fr: { title: "Billets", scan: "Scanner QR", sort: "Trier", search: "Rechercher..." },
    ja: { title: "チケット", scan: "QRスキャン", sort: "並べ替え", search: "検索..." },
    he: { title: "כרטיסים", scan: "סרוק QR", sort: "מיין", search: "חיפוש..." }
};

function applyLanguage(lang) {
    document.querySelectorAll("[data-i18n]").forEach(el => {
        el.textContent = translations[lang][el.dataset.i18n];
    });
    document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
        el.placeholder = translations[lang][el.dataset.i18n-placeholder];
    });
    localStorage.setItem("lang", lang);
}

const langSelect = document.getElementById("langSelect");
langSelect.addEventListener("change", e => applyLanguage(e.target.value));
applyLanguage(localStorage.getItem("lang") || "en");

/* ------------------ TICKETS ------------------ */
let tickets = JSON.parse(localStorage.getItem("tickets") || "[]");

function saveTickets() {
    localStorage.setItem("tickets", JSON.stringify(tickets));
}

function renderTickets() {
    const list = document.getElementById("ticketList");
    list.innerHTML = "";
    const search = document.getElementById("searchInput").value.toLowerCase();

    tickets
        .filter(t => t.text.toLowerCase().includes(search))
        .forEach((t, index) => {
            const div = document.createElement("div");
            div.className = "ticket";
            div.innerHTML = `
                <div class="ticket-header">
                    <span>${new Date(t.date).toLocaleString()}</span>
                    <div>
                        <button class="edit-btn" onclick="editTicket(${index})">Edit</button>
                        <button class="delete-btn" onclick="deleteTicket(${index})">Del</button>
                    </div>
                </div>
                <div class="ticket-text">${t.text}</div>
            `;
            list.appendChild(div);
        });
}
renderTickets();

function deleteTicket(i) {
    tickets.splice(i, 1);
    saveTickets();
    renderTickets();
}

function editTicket(i) {
    const newText = prompt("Edit ticket:", tickets[i].text);
    if (newText !== null) {
        tickets[i].text = newText.trim();
        saveTickets();
        renderTickets();
    }
}

document.getElementById("sortBtn").addEventListener("click", () => {
    tickets.sort((a, b) => new Date(b.date) - new Date(a.date));
    saveTickets();
    renderTickets();
});

document.getElementById("searchInput").addEventListener("input", renderTickets);

/* ------------------ QR SCANNER ------------------ */
const scannerPage = document.getElementById("scannerPage");
const video = document.getElementById("camera");
document.getElementById("openScanner").onclick = openScanner;

async function openScanner() {
    scannerPage.style.display = "flex";

    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" }
        });
        video.srcObject = stream;
        scanLoop();
    } catch (err) {
        alert("Camera access denied.");
        closeScanner();
    }
}

function closeScanner() {
    scannerPage.style.display = "none";
    stopCamera();
}

function stopCamera() {
    const stream = video.srcObject;
    if (stream) stream.getTracks().forEach(t => t.stop());
}

/* ------------------ FIX: iPHONE ROTATION + CANVAS ------------------ */
function scanLoop() {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    function tick() {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {

            const vw = video.videoWidth;
            const vh = video.videoHeight;

            canvas.width = vh;
            canvas.height = vw;

            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.rotate(-90 * Math.PI / 180);
            ctx.drawImage(video, -vw / 2, -vh / 2);
            ctx.restore();

            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imgData.data, canvas.width, canvas.height);

            if (code && code.data) {
                tickets.unshift({ text: code.data, date: Date.now() });
                saveTickets();
                renderTickets();
                closeScanner();
                return;
            }
        }
        requestAnimationFrame(tick);
    }

    tick();
}
</script>

</body>
</html>
