<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Tickets</title>
  
  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tickets" />
  
  <!-- Apple Touch Icon -->
  <link rel="apple-touch-icon" href="apple-touch-icon.PNG" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.PNG" />
  
  <!-- Manifest & Theme -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#000000" />
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />

  <style>
    html, body {
      overscroll-behavior: none;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    }

    header {
      padding: 12px 16px;
      background: #111;
      border-bottom: 1px solid #222;
      font-size: 20px;
      font-weight: 600;
    }

    .container {
      padding: 12px;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1c1c1e;
      color: #fff;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: #0a84ff;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    .ticket-item {
      background: #1c1c1e;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #333;
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
    }

    .ticket-item.done {
      opacity: 0.5;
      text-decoration: line-through;
    }

    .ticket-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .ticket-btn {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
    }

    .ticket-btn.done { background: #30d158; }
    .ticket-btn.edit { background: #ffd60a; color: #000; }
    .ticket-btn.delete { background: #ff453a; }

    #qrSection {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 999;
    }

    #qrVideo {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }

    .qr-frame {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 260px;
      height: 260px;
      border: 2px solid #00ff99;
      border-radius: 16px;
      transform: translate(-50%, -50%);
    }
  </style>
</head>

<body>

<header>مدیریت تیکت</header>

<div class="container">
  <input id="ticketTitle" placeholder="عنوان تیکت">
  <textarea id="ticketNote" placeholder="یادداشت"></textarea>
  <button id="addTicketBtn">افزودن تیکت</button>

  <input id="searchInput" placeholder="جستجو..." style="margin-top:20px">

  <select id="sortSelect">
    <option value="newest">جدیدترین</option>
    <option value="oldest">قدیمی‌ترین</option>
    <option value="undone">انجام‌نشده‌ها</option>
  </select>

  <button id="scanQrBtn">اسکن QR</button>

  <ul id="ticketList"></ul>
</div>

<div id="qrSection">
  <video id="qrVideo" autoplay playsinline></video>
  <div class="qr-frame"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script src="script.js"></script>

</body>
</html>
