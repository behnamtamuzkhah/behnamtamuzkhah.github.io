<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8" />
  <title>Ticket Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#ffffff" />
  <meta http-equiv="Permissions-Policy" content="camera=*" />

  <link rel="stylesheet" href="style.css" />

  <script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

  <style>
    .lang-switcher {
      position: absolute;
      top: 10px;
      left: 10px;
      padding: 5px;
      font-size: 14px;
      border-radius: 6px;
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="app-header">
      <h1 id="titleText">مدیریت تیکت</h1>

<select id="langSelect" class="lang-switcher">
  <option value="fa">🌐 فارسی</option>
  <option value="de">🌐 Deutsch</option>
  <option value="en">🌐 English</option>
</select>
    </header>

    <main class="app-main">

      <section class="search-box">
        <input id="searchInput" type="text" placeholder="جستجو..." />
      </section>

      <section class="sort-box">
        <select id="sortSelect">
          <option value="newest">جدیدترین</option>
          <option value="oldest">قدیمی‌ترین</option>
          <option value="undone">انجام‌نشده‌ها</option>
        </select>
      </section>

      <section class="ticket-form">
        <input id="ticketTitle" type="text" placeholder="عنوان تیکت" />
        <input id="ticketNote" type="text" placeholder="یادداشت" />

        <div class="form-actions">
          <button id="addTicketBtn" class="primary-btn">افزودن تیکت</button>
          <button id="scanQrBtn" class="secondary-btn">اسکن QR</button>
        </div>
      </section>

      <section id="qrSection" class="qr-section" style="display:none;">
        <video id="qrVideo" class="qr-video" muted playsinline autoplay></video>
        <canvas id="qrCanvas" style="display:none;"></canvas>
        <div class="qr-hint" id="qrHint">دوربین را روی QR نگه دارید…</div>
        <div id="qrResult" class="qr-result"></div>
        <button id="stopQrBtn" class="secondary-btn" style="margin-top:8px;">توقف اسکن</button>
      </section>

      <section class="ticket-list-section">
        <h2 id="ticketsHeader">تیکت‌ها</h2>
        <ul id="ticketList" class="ticket-list"></ul>
      </section>

    </main>
  </div>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>

  <!-- ترجمه‌ها -->
  <script>
    let currentLang = "fa";

    const translations = {
      fa: {
        title: "مدیریت تیکت",
        search: "جستجو...",
        newest: "جدیدترین",
        oldest: "قدیمی‌ترین",
        undone: "انجام‌نشده‌ها",
        ticketTitle: "عنوان تیکت",
        ticketNote: "یادداشت",
        addTicket: "افزودن تیکت",
        scanQR: "اسکن QR",
        stopScan: "توقف اسکن",
        tickets: "تیکت‌ها",
        cameraHint: "دوربین را روی QR نگه دارید…",
        done: "انجام شد",
        edit: "ویرایش",
        delete: "حذف"
      },
      de: {
        title: "Ticketverwaltung",
        search: "Suche...",
        newest: "Neueste",
        oldest: "Älteste",
        undone: "Unerledigt",
        ticketTitle: "Ticket Titel",
        ticketNote: "Notiz",
        addTicket: "Ticket hinzufügen",
        scanQR: "QR scannen",
        stopScan: "Scan stoppen",
        tickets: "Tickets",
        cameraHint: "Halten Sie die Kamera auf den QR-Code…",
        done: "Erledigt",
        edit: "Bearbeiten",
        delete: "Löschen"
      },
      en: {
        title: "Ticket Manager",
        search: "Search...",
        newest: "Newest",
        oldest: "Oldest",
        undone: "Undone",
        ticketTitle: "Ticket Title",
        ticketNote: "Note",
        addTicket: "Add Ticket",
        scanQR: "Scan QR",
        stopScan: "Stop Scan",
        tickets: "Tickets",
        cameraHint: "Hold the camera over the QR…",
        done: "Done",
        edit: "Edit",
        delete: "Delete"
      }
    };

    function applyLanguage(lang) {
      const t = translations[lang];

      document.getElementById("titleText").textContent = t.title;
      document.getElementById("searchInput").placeholder = t.search;

      document.querySelector("#sortSelect option[value='newest']").textContent = t.newest;
      document.querySelector("#sortSelect option[value='oldest']").textContent = t.oldest;
      document.querySelector("#sortSelect option[value='undone']").textContent = t.undone;

      document.getElementById("ticketTitle").placeholder = t.ticketTitle;
      document.getElementById("ticketNote").placeholder = t.ticketNote;

      document.getElementById("addTicketBtn").textContent = t.addTicket;
      document.getElementById("scanQrBtn").textContent = t.scanQR;
      document.getElementById("stopQrBtn").textContent = t.stopScan;

      document.getElementById("ticketsHeader").textContent = t.tickets;
      document.getElementById("qrHint").textContent = t.cameraHint;

      document.querySelectorAll(".ticket-btn.done").forEach(btn => btn.textContent = t.done);
      document.querySelectorAll(".ticket-btn.edit").forEach(btn => btn.textContent = t.edit);
      document.querySelectorAll(".ticket-btn.delete").forEach(btn => btn.textContent = t.delete);
    }

    document.getElementById("langSelect").addEventListener("change", (e) => {
      currentLang = e.target.value;
      applyLanguage(currentLang);
    });

    applyLanguage("fa");
  </script>

  <!-- QR Scanner -->
  <script>
    let qrStream = null;
    let qrScanning = false;
    let lastScannedText = null;

    async function startQRScanner() {
      const video = document.getElementById("qrVideo");
      const canvas = document.getElementById("qrCanvas");
      const ctx = canvas.getContext("2d");
      const resultBox = document.getElementById("qrResult");
      const qrSection = document.getElementById("qrSection");

      qrSection.style.display = "block";
      resultBox.textContent = "";

      if (!qrStream) {
        try {
          qrStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: "environment" } },
            audio: false
          });
        } catch (e) {
          return;
        }
      }

      video.srcObject = qrStream;
      await video.play();

      qrScanning = true;

      function scanLoop() {
        if (!qrScanning || !qrStream || !qrStream.active) return;

        if (video.videoWidth === 0) {
          requestAnimationFrame(scanLoop);
          return;
        }

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, canvas.width, canvas.height);

        if (code) {
          const text = code.data;

          if (text !== lastScannedText) {
            lastScannedText = text;

            resultBox.textContent = "نتیجه: " + text;
            document.getElementById("ticketTitle").value = text;

            if (text.startsWith("http://") || text.startsWith("https://")) {
              let opened = null;
              try {
                opened = window.open(text, "_blank");
              } catch (e) {
                opened = null;
              }
              if (!opened) window.location.href = text;
            }
          }
        }

        requestAnimationFrame(scanLoop);
      }

      scanLoop();
    }

    function stopQRScanner() {
      const qrSection = document.getElementById("qrSection");
      qrSection.style.display = "none";
      qrScanning = false;
      lastScannedText = null;

      if (qrStream) {
        qrStream.getTracks().forEach(t => t.stop());
        qrStream = null;
      }
    }

    document.getElementById("scanQrBtn").addEventListener("click", startQRScanner);
    document.getElementById("stopQrBtn").addEventListener("click", stopQRScanner);
  </script>

  <script src="script.js"></script>

</body>
</html>
