<!DOCTYPE html>
<html lang="de">
<head>
  <link rel="apple-touch-startup-image" href="splash.png">
  <meta charset="UTF-8" />
  <title>Ticketverwaltung</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="manifest" href="manifest.json">
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
  }
</script>

  <style>
    :root {
      --bg-light: #f2f2f7;
      --bg-dark: #000000;
      --card-light: #ffffff;
      --card-dark: #1c1c1e;
      --text-light: #1c1c1e;
      --text-dark: #ffffff;
      --text-muted-light: #6e6e73;
      --text-muted-dark: #a1a1a6;
      --border-light: #d1d1d6;
      --border-dark: #3a3a3c;
      --primary: #007aff;
      --secondary: #ff9500;
      --danger: #ff3b30;
      --success: #34c759;
      --edit: #5856d6;
      --radius-lg: 18px;
      --radius-md: 12px;
      --shadow-light: 0 10px 25px rgba(0,0,0,0.08);
      --shadow-dark: 0 10px 25px rgba(0,0,0,0.6);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      background: var(--bg-light);
      color: var(--text-light);
      display: flex;
      justify-content: center;
      padding: 16px;
      transition: background .25s ease, color .25s ease;
    }

    body.dark {
      background: var(--bg-dark);
      color: var(--text-dark);
    }

    .app {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 100vh;
    }

    .card {
      background: var(--card-light);
      border-radius: 24px;
      padding: 16px;
      box-shadow: var(--shadow-light);
      border: 1px solid rgba(0,0,0,0.05);
      transition: .25s ease;
    }

    body.dark .card {
      background: var(--card-dark);
      box-shadow: var(--shadow-dark);
      border-color: rgba(255,255,255,0.06);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .header-title {
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      flex: 1;
    }

    .header-side {
      width: 90px;
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .header-side.right {
      justify-content: flex-end;
    }

    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      border: 1px solid var(--border-light);
      background: rgba(255,255,255,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: .2s ease;
      font-size: 15px;
    }

    body.dark .icon-btn {
      background: rgba(28,28,30,0.95);
      border-color: var(--border-dark);
    }

    .icon-btn:active {
      transform: scale(.95);
    }

    .lang-switcher {
      display: flex;
      background: rgba(242,242,247,0.9);
      border-radius: 999px;
      border: 1px solid var(--border-light);
      padding: 2px;
      gap: 2px;
    }

    body.dark .lang-switcher {
      background: rgba(28,28,30,0.95);
      border-color: var(--border-dark);
    }

    .lang-btn {
      border: none;
      background: transparent;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      cursor: pointer;
      opacity: .6;
      transition: .2s ease;
      min-width: 26px;
      text-align: center;
    }

    .lang-btn.active {
      background: rgba(0,122,255,0.15);
      opacity: 1;
      font-weight: 600;
    }

    .search-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .search-input,
    .select,
    .field {
      width: 100%;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-light);
      padding: 10px 12px;
      font-size: 14px;
      background: rgba(255,255,255,0.9);
      transition: .2s ease;
      outline: none;
    }

    body.dark .search-input,
    body.dark .select,
    body.dark .field {
      background: rgba(28,28,30,0.95);
      border-color: var(--border-dark);
    }

    .search-input::placeholder,
    .field::placeholder {
      color: var(--text-muted-light);
    }

    body.dark .search-input::placeholder,
    body.dark .field::placeholder {
      color: var(--text-muted-dark);
    }

    .select {
      min-width: 110px;
    }

    .actions-row {
      display: flex;
      gap: 10px;
      margin: 10px 0;
    }

    .btn {
      flex: 1;
      border: none;
      border-radius: var(--radius-lg);
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: var(--primary);
      cursor: pointer;
      transition: .15s ease;
    }

    .btn-secondary {
      background: var(--secondary);
    }

    .btn:active {
      transform: scale(.96);
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      margin: 6px 2px 8px;
      color: var(--text-muted-light);
    }

    body.dark .section-title {
      color: var(--text-muted-dark);
    }

    .ticket-card {
      background: rgba(255,255,255,0.95);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-light);
      padding: 10px 10px 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: .25s ease;
    }

    body.dark .ticket-card {
      background: rgba(28,28,30,0.98);
      border-color: var(--border-dark);
    }

    .ticket-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .ticket-title {
      font-size: 13px;
      font-weight: 600;
      word-break: break-word;
    }

    .ticket-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 999px;
      background: rgba(52,199,89,0.12);
      color: var(--success);
    }

    body.dark .ticket-badge {
      background: rgba(52,199,89,0.25);
    }

    .ticket-note {
      font-size: 11px;
      color: var(--text-muted-light);
      word-break: break-word;
    }

    body.dark .ticket-note {
      color: var(--text-muted-dark);
    }

    .ticket-url {
      font-size: 11px;
      color: var(--text-muted-light);
      word-break: break-all;
    }

    body.dark .ticket-url {
      color: var(--text-muted-dark);
    }

    .ticket-actions {
      display: flex;
      gap: 6px;
      margin-top: 4px;
    }

    .ticket-btn {
      flex: 1;
      border: none;
      border-radius: var(--radius-md);
      padding: 7px;
      font-size: 11px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      transition: .15s ease;
    }

    .ticket-btn.delete { background: var(--danger); }
    .ticket-btn.edit { background: var(--edit); }
    .ticket-btn.done { background: var(--success); }

    .ticket-btn:active {
      transform: scale(.96);
    }

    .empty-state {
      font-size: 12px;
      color: var(--text-muted-light);
      text-align: center;
      padding: 10px 4px 4px;
    }

    body.dark .empty-state {
      color: var(--text-muted-dark);
    }

    .rtl { direction: rtl; }
    .rtl .search-row { flex-direction: row-reverse; }
    .rtl .ticket-actions { flex-direction: row-reverse; }
  </style>
</head>

<body>
  <div class="app" id="app">
    <div class="card">
      <div class="header">
        <div class="header-side">
          <div class="icon-btn">🌐</div>
        </div>

        <div class="header-title" id="titleText">Ticketverwaltung</div>

        <div class="header-side right">
          <div class="lang-switcher" id="langSwitcher">
            <button class="lang-btn active" data-lang="DE">DE</button>
            <button class="lang-btn" data-lang="EN">EN</button>
            <button class="lang-btn" data-lang="FA">FA</button>
            <button class="lang-btn" data-lang="HE">HE</button>
            <button class="lang-btn" data-lang="JP">JP</button>
            <button class="lang-btn" data-lang="FR">FR</button>
          </div>

          <div class="icon-btn" id="themeToggle">🌙</div>
        </div>
      </div>

      <div class="search-row">
        <input id="searchInput" class="search-input" placeholder="Suche..." />
        <select id="sortSelect" class="select">
          <option value="newest">Neueste</option>
          <option value="oldest">Älteste</option>
        </select>
      </div>

      <input id="titleInput" class="field" placeholder="Ticket Titel" />
      <input id="noteInput" class="field" placeholder="Notiz" />

      <div class="actions-row">
        <button class="btn" id="scanBtn">QR scannen</button>
        <button class="btn btn-secondary" id="addBtn">Ticket hinzufügen</button>
      </div>

      <div class="section-title" id="ticketsLabel">Tickets</div>
      <div id="ticketsContainer"></div>
    </div>
  </div>

  <script>
    const strings = {
      DE:{dir:"ltr",title:"Ticketverwaltung",search:"Suche...",newest:"Neueste",oldest:"Älteste",ticketTitle:"Ticket Titel",note:"Notiz",scan:"QR scannen",add:"Ticket hinzufügen",tickets:"Tickets",del:"Löschen",edit:"Bearbeiten",done:"Erledigt",empty:"Noch keine Tickets."},
      EN:{dir:"ltr",title:"Ticket Management",search:"Search...",newest:"Newest",oldest:"Oldest",ticketTitle:"Ticket Title",note:"Note",scan:"Scan QR",add:"Add Ticket",tickets:"Tickets",del:"Delete",edit:"Edit",done:"Done",empty:"No tickets yet."},
      FA:{dir:"rtl",title:"مدیریت تیکت‌ها",search:"...جستجو",newest:"جدیدترین",oldest:"قدیمی‌ترین",ticketTitle:"عنوان تیکت",note:"یادداشت",scan:"اسکن QR",add:"افزودن تیکت",tickets:"تیکت‌ها",del:"حذف",edit:"ویرایش",done:"انجام شد",empty:"هنوز تیکتی ثبت نشده است."},
      HE:{dir:"rtl",title:"ניהול כרטיסים",search:"...חיפוש",newest:"החדשים ביותר",oldest:"הישנים ביותר",ticketTitle:"כותרת הכרטיס",note:"הערה",scan:"סרוק QR",add:"הוספת כרטיס",tickets:"כרטיסים",del:"למחוק",edit:"עריכה",done:"בוצע",empty:"עדיין אין כרטיסים."},
      JP:{dir:"ltr",title:"チケット管理",search:"検索…",newest:"最新",oldest:"最古",ticketTitle:"チケットタイトル",note:"メモ",scan:"QRコード読み取り",add:"チケット追加",tickets:"チケット",del:"削除",edit:"編集",done:"完了",empty:"まだチケットがありません。"},
      FR:{dir:"ltr",title:"Gestion des Tickets",search:"Recherche...",newest:"Plus récent",oldest:"Plus ancien",ticketTitle:"Titre du ticket",note:"Note",scan:"Scanner QR",add:"Ajouter un ticket",tickets:"Tickets",del:"Supprimer",edit:"Modifier",done:"Terminé",empty:"Aucun ticket pour le moment."}
    };

    const app = document.getElementById("app");
    const titleText = document.getElementById("titleText");
    const searchInput = document.getElementById("searchInput");
    const sortSelect = document.getElementById("sortSelect");
    const titleInput = document.getElementById("titleInput");
    const noteInput = document.getElementById("noteInput");
    const scanBtn = document.getElementById("scanBtn");
    const addBtn = document.getElementById("addBtn");
    const ticketsLabel = document.getElementById("ticketsLabel");
    const ticketsContainer = document.getElementById("ticketsContainer");
    const themeToggle = document.getElementById("themeToggle");
    const langSwitcher = document.getElementById("langSwitcher");

    let currentLang = "DE";
    let tickets = [];
    const STORAGE_KEY = "tickets-v1";

    function loadTickets() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          tickets = JSON.parse(raw);
        } else {
          tickets = [{
            id: Date.now(),
            title: "7melons Registrierung",
            note: "Kassenzettel Aktion",
            url: "https://7melons.ch/de/register#utm_source=Post&utm_medium=KZ&utm_campaign=Kassenzettel&utm_id=887432",
            done: false,
            createdAt: Date.now()
          }];
          saveTickets();
        }
      } catch(e) {
        tickets = [];
      }
    }

    function saveTickets() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tickets));
    }

    function renderTickets() {
      ticketsContainer.innerHTML = "";
      const s = strings[currentLang];

      let filtered = [...tickets];
      const q = searchInput.value.trim().toLowerCase();
      if (q) {
        filtered = filtered.filter(t =>
          (t.title || "").toLowerCase().includes(q) ||
          (t.note || "").toLowerCase().includes(q) ||
          (t.url || "").toLowerCase().includes(q)
        );
      }

      filtered.sort((a,b) => {
        if (sortSelect.value === "oldest") return a.createdAt - b.createdAt;
        return b.createdAt - a.createdAt;
      });

      if (!filtered.length) {
        const div = document.createElement("div");
        div.className = "empty-state";
        div.textContent = s.empty;
        ticketsContainer.appendChild(div);
        return;
      }

      filtered.forEach(ticket => {
        const card = document.createElement("div");
        card.className = "ticket-card";

        const header = document.createElement("div");
        header.className = "ticket-header";

        const titleEl = document.createElement("div");
        titleEl.className = "ticket-title";
        titleEl.textContent = ticket.title || "(untitled)";

        header.appendChild(titleEl);

        if (ticket.done) {
          const badge = document.createElement("div");
          badge.className = "ticket-badge";
          badge.textContent = s.done;
          header.appendChild(badge);
        }

        card.appendChild(header);

        if (ticket.note) {
          const noteEl = document.createElement("div");
          noteEl.className = "ticket-note";
          noteEl.textContent = ticket.note;
          card.appendChild(noteEl);
        }

        if (ticket.url) {
          const urlEl = document.createElement("div");
          urlEl.className = "ticket-url";
          urlEl.textContent = ticket.url;
          card.appendChild(urlEl);
        }

        const actions = document.createElement("div");
        actions.className = "ticket-actions";

        const delBtn = document.createElement("button");
        delBtn.className = "ticket-btn delete";
        delBtn.textContent = s.del;
        delBtn.onclick = () => {
          tickets = tickets.filter(t => t.id !== ticket.id);
          saveTickets();
          renderTickets();
        };

        const editBtn = document.createElement("button");
        editBtn.className = "ticket-btn edit";
        editBtn.textContent = s.edit;
        editBtn.onclick = () => {
          const newTitle = prompt(s.ticketTitle, ticket.title || "");
          if (newTitle === null) return;
          const newNote = prompt(s.note, ticket.note || "");
          if (newNote === null) return;
          ticket.title = newTitle.trim() || ticket.title;
          ticket.note = newNote.trim();
          saveTickets();
          renderTickets();
        };

        const doneBtn = document.createElement("button");
        doneBtn.className = "ticket-btn done";
        doneBtn.textContent = ticket.done ? s.done : s.done;
        doneBtn.onclick = () => {
          ticket.done = !ticket.done;
          saveTickets();
          renderTickets();
        };

        actions.appendChild(delBtn);
        actions.appendChild(editBtn);
        actions.appendChild(doneBtn);

        card.appendChild(actions);
        ticketsContainer.appendChild(card);
      });
    }

    function applyLang(lang) {
      const s = strings[lang];
      if (!s) return;
      currentLang = lang;

      document.querySelectorAll(".lang-btn").forEach(b => {
        b.classList.toggle("active", b.dataset.lang === lang);
      });

      document.documentElement.dir = s.dir;
      if (s.dir === "rtl") app.classList.add("rtl");
      else app.classList.remove("rtl");

      titleText.textContent = s.title;
      searchInput.placeholder = s.search;
      sortSelect.options[0].textContent = s.newest;
      sortSelect.options[1].textContent = s.oldest;
      titleInput.placeholder = s.ticketTitle;
      noteInput.placeholder = s.note;
      scanBtn.textContent = s.scan;
      addBtn.textContent = s.add;
      ticketsLabel.textContent = s.tickets;

      renderTickets();
    }

    langSwitcher.addEventListener("click", e => {
      const btn = e.target.closest(".lang-btn");
      if (!btn) return;
      applyLang(btn.dataset.lang);
    });

    themeToggle.addEventListener("click", e => {
      document.body.classList.toggle("dark");
      themeToggle.textContent = document.body.classList.contains("dark") ? "☀️" : "🌙";
    });

    addBtn.addEventListener("click", () => {
      const s = strings[currentLang];
      const title = titleInput.value.trim();
      const note = noteInput.value.trim();

      if (!title && !note) {
        alert(s.ticketTitle + " / " + s.note);
        return;
      }

      const ticket = {
        id: Date.now(),
        title,
        note,
        url: "",
        done: false,
        createdAt: Date.now()
      };

      tickets.unshift(ticket);
      saveTickets();
      titleInput.value = "";
      noteInput.value = "";
      renderTickets();
    });

    searchInput.addEventListener("input", renderTickets);
    sortSelect.addEventListener("change", renderTickets);

    scanBtn.addEventListener("click", () => {
      alert("QR scan placeholder – مرحلهٔ بعدی QR واقعی رو اضافه می‌کنیم.");
    });

    loadTickets();
    applyLang(currentLang);
  </script>
</body>
</html>
